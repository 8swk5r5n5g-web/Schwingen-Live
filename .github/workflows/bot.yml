name: Schwingfest Live Ticker Pro

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ticker-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: 50-Minuten Live-Schleife (Scan alle 3 Minuten)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHAT_ID_NACHWUCHS: ${{ secrets.SCHWINGEN_LIVE_JUNGSCHWINGER }}
        run: |
          for run in {1..16}
          do
            echo "=========================================="
            echo "📊 STARTE LIVE-SCAN DURCHGANG $run VON 16"
            echo "=========================================="
            
            python main.py
            
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action Pro"
            if [ -f state.json ] && ! git diff --exit-code state.json; then
              git add state.json
              git commit -m "Zustand aktualisiert (Lauf $run) [skip ci]"
              git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main || echo "Push fehlgeschlagen, versuche es im nächsten Durchgang erneut."
            fi

            if [ $run -eq 16 ]; then
              echo "Stündlicher Schleifendurchlauf beendet. Job schließt sauber."
              break
            fi

            echo "Scan $run beendet. Warte 3 Minuten..."
            seconds=0
            while [ $seconds -lt 180 ]; do
              sleep 60
              seconds=$((seconds + 60))
              echo "⏱️ Bot überwacht aktiv. Wartestatus: $((seconds / 60)) Minute(n) um."
            done
          done
