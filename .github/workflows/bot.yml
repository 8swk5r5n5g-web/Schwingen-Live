name: Schwingfest Bot Ticker

on:
  schedule:
    # GitHub startet den Bot alle 5 Minuten für eine kurze Abfrage automatisch
    - cron: '*/5 * * * *'
  workflow_dispatch: # Erlaubt dir den manuellen Start per Klick

jobs:
  run-bot-fast:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig für das Speichern der state.json
    
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: Blitzschneller Kurz-Scan (ca. 10 Sekunden)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python main.py
          
          # Zustand sofort sichern und beenden
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f state.json ] && ! git diff --exit-code state.json; then
            git add state.json
            git commit -m "Zustand aktualisiert [skip ci]"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main || echo "Push fehlgeschlagen"
          else
            echo "Keine neuen Dokumente. Keine Ressourcen verschwendet."
          fi
