name: Schwingfest Bot 5-Minuten-Takt

on:
  schedule:
    # Taktet den Bot am Wochenende (Samstag und Sonntag) alle 5 Minuten ein
    - cron: '*/5 * * * 6,0'
  workflow_dispatch: # Ermöglicht dir jederzeit einen händischen Start

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: Zustand wiederherstellen
        uses: actions/cache@v3
        with:
          path: state.json
          key: state-file-${{ github.run_id }}
          restore-keys: |
            state-file-

      - name: Bot ausführen
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
