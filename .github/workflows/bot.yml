name: Schwingfest Bot Ticker

on:
  schedule:
    - cron: '*/5 * * * *' # Läuft alle 5 Minuten rund um die Uhr
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: Bot ausführen
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Zustand permanent in GitHub speichern
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f state.json ] && ! git diff --exit-code state.json; then
            git add state.json
            git commit -m "Zustand aktualisiert [skip ci]"
            git push origin main
          else
            echo "Keine Änderungen am Zustand."
          fi
