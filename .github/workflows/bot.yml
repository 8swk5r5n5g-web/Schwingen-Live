name: Schwingfest Bot Ticker

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-bot-smart-interval:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 📜 Gibt dem Bot explizit die Erlaubnis, Dateien zu speichern!
    
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: Ausführung im 5-Minuten-Takt innerhalb des Workflows
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "=== Start Durchlauf 1 ==="
          python main.py
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f state.json ] && ! git diff --exit-code state.json; then
            git add state.json
            git commit -m "Zustand aktualisiert (Lauf 1) [skip ci]"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main || echo "Push fehlgeschlagen"
          fi

          echo "Warte 5 Minuten bis zum nächsten automatischen Scan..."
          sleep 300

          echo "=== Start Durchlauf 2 ==="
          python main.py
          
          if [ -f state.json ] && ! git diff --exit-code state.json; then
            git add state.json
            git commit -m "Zustand aktualisiert (Lauf 2) [skip ci]"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main || echo "Push fehlgeschlagen"
          fi
